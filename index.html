<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEKT Foundation Archive</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            text-align: center;
            margin: 0;
            padding: 0;
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 80px 20px;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #1a1a1a;
        }

        .header h1 {
            font-size: 42px;
            margin: 0;
            text-shadow: 0 0 10px #00cc00, 0 0 20px #00cc00;
            letter-spacing: 4px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 60px 20px;
            flex-grow: 1;
        }

        .button {
            display: block;
            background: #111;
            color: #d4d4d4;
            padding: 15px 0;
            width: 280px;
            font-size: 16px;
            border: 1px solid #333;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .button:hover {
            background: #0b0b0d;
            border-color: #0b0b0d;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(0, 204, 0, 0.3);
            transform: translateY(-2px);
        }
        .button:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to the SEKT Foundation Archive!</h1>
        <p>Here is a collection of real information about anomalies in real life.</p>
    </div>
    <div class="buttons">
        <a href="obj" class="button">Objects</a>
        <a href="classes" class="button">Classes</a>
        <a href="info" class="button">Info</a>
    </div>
</body>
</html>
