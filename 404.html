<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - SEKT</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            border-bottom: 1px solid #222;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #0f0f0f;
        }
        .logo {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 2px;
        }
        .sys-info {
            font-size: 12px;
            color: #555;
            text-transform: uppercase;
        }
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .error-container {
            border: 1px solid #222;
            padding: 40px 50px;
            background-color: #0f0f0f;
            max-width: 600px;
            width: 100%;
        }
        .error-code {
            font-size: 64px;
            margin: 0 0 5px 0;
            color: #ffffff;
            font-weight: normal;
        }
        .error-title {
            font-size: 20px;
            margin: 0 0 20px 0;
            font-weight: normal;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        hr {
            border: none;
            border-top: 1px solid #222;
            margin: 20px 0;
        }
        .error-desc {
            font-size: 14px;
            line-height: 1.6;
            color: #888;
            margin-bottom: 35px;
        }
        .button {
            display: inline-block;
            background: #111;
            color: #d4d4d4;
            padding: 12px 30px;
            font-size: 14px;
            border: 1px solid #333;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }
        .button:hover {
            background: #222;
            border-color: #555;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">SEKT // ARCHIVE</div>
        <div class="sys-info">https://regiaapioou.pp.ua/</div>
    </header>
    <main>
        <div class="error-container">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Document Not Found</h2>
            <hr>
            <p class="error-desc">The requested anomaly file, directory, or index reference does not exist. It may have been relocated, expunged, or you may have entered an invalid parameter.</p>
            <a href="https://regiaapioou.pp.ua" class="button">Return to Index</a>
        </div>
    </main>
</body>
</html>
